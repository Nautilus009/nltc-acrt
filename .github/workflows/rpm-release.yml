name: RPM Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sign-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Install build and signing tools
        run: |
          dnf -y install \
            git \
            rpm-build \
            rpm-sign \
            python3 \
            python3-setuptools \
            gnupg2 \
            findutils

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(awk -F'"' '/__version__/ {print $2; exit}' src/acrt_pkg/__init__.py)"
          if [ "$TAG_NAME" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_NAME) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build RPMs
        run: ./scripts/build-rpm.sh

      - name: Import GPG key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$RPM_GPG_PRIVATE_KEY" ]; then
            echo "Missing RPM_GPG_PRIVATE_KEY secret"
            exit 1
          fi

          KEY_FILE=/tmp/rpm-signing-private.key

          # Accept either:
          # 1) ASCII-armored key block stored directly in the secret, or
          # 2) base64-encoded key material.
          if printf '%s' "$RPM_GPG_PRIVATE_KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            printf '%s\n' "$RPM_GPG_PRIVATE_KEY" > "$KEY_FILE"
          elif printf '%s' "$RPM_GPG_PRIVATE_KEY" | base64 --decode > "$KEY_FILE" 2>/dev/null; then
            true
          else
            # Handle secrets where newlines were escaped as literal "\n".
            printf '%b' "$RPM_GPG_PRIVATE_KEY" > "$KEY_FILE"
          fi

          gpg --batch --pinentry-mode loopback --import "$KEY_FILE"
          gpg --batch --list-secret-keys --keyid-format LONG

      - name: Configure rpmsign
        env:
          RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
          RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}
        run: |
          if [ -z "$RPM_GPG_KEY_ID" ] || [ -z "$RPM_GPG_PASSPHRASE" ]; then
            echo "Missing RPM_GPG_KEY_ID or RPM_GPG_PASSPHRASE secret"
            exit 1
          fi

          PASS_FILE=/tmp/rpm-gpg-passphrase
          printf '%s' "$RPM_GPG_PASSPHRASE" > "$PASS_FILE"
          chmod 600 "$PASS_FILE"

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' 'allow-loopback-pinentry' >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

          {
            printf '%s\n' '%_signature gpg'
            printf '%%_gpg_name %s\n' "$RPM_GPG_KEY_ID"
            printf '%s\n' '%_gpg_path ~/.gnupg'
            printf '%s\n' '%_gpgbin /usr/bin/gpg'
            printf '%s\n' '%__gpg /usr/bin/gpg'
            printf '%s\n' '%__gpg_check_password_cmd /bin/true'
            printf '%%_gpg_passphrase_file %s\n' "$PASS_FILE"
            printf '%s\n' '%__gpg_sign_cmd %{__gpg} --batch --no-tty --yes --pinentry-mode loopback \\'
            printf '%s\n' '  --passphrase-file %{_gpg_passphrase_file} --no-armor \\'
            printf '%s\n' '  --local-user "%{_gpg_name}" --detach-sign --digest-algo sha256 \\'
            printf '%s\n' '  --output %{__signature_filename} %{__plaintext_filename}'
          } > ~/.rpmmacros

      - name: Sign RPMs
        env:
          RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
        run: |
          export GNUPGHOME="$HOME/.gnupg"
          export GPG_TTY=/dev/null

          find .rpmbuild/RPMS -type f -name '*.rpm' -print0 | while IFS= read -r -d '' rpm_file; do
            rpmsign --addsign \
              --define "_signature gpg" \
              --define "_gpg_name $RPM_GPG_KEY_ID" \
              --define "_gpg_path $GNUPGHOME" \
              --define "__gpg /usr/bin/gpg" \
              --define "__gpg_check_password_cmd /bin/true" \
              --define "__gpg_sign_cmd %{__gpg} --batch --no-tty --yes --pinentry-mode loopback --passphrase-file %{_gpg_passphrase_file} --no-armor --local-user \"%{_gpg_name}\" --detach-sign --digest-algo sha256 --output %{__signature_filename} %{__plaintext_filename}" \
              "$rpm_file"
          done

      - name: Verify RPM signatures
        run: |
          find .rpmbuild/RPMS -type f -name '*.rpm' -print0 | xargs -0 -r rpm --checksig

      - name: Upload signed RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nltc-acrt-rpm-${{ github.ref_name }}
          path: |
            .rpmbuild/RPMS/**/*.rpm
            .rpmbuild/SRPMS/*.src.rpm

      - name: Publish to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .rpmbuild/RPMS/**/*.rpm
            .rpmbuild/SRPMS/*.src.rpm
