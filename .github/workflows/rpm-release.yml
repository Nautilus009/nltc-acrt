name: RPM Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sign-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Install build and signing tools
        run: |
          dnf -y install \
            git \
            rpm-build \
            rpm-sign \
            python3 \
            python3-setuptools \
            gnupg2 \
            findutils

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(awk -F'"' '/__version__/ {print $2; exit}' src/acrt_pkg/__init__.py)"
          if [ "$TAG_NAME" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_NAME) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build RPMs
        run: ./scripts/build-rpm.sh

      - name: Import GPG key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$RPM_GPG_PRIVATE_KEY" ]; then
            echo "Missing RPM_GPG_PRIVATE_KEY secret"
            exit 1
          fi
          printf '%s' "$RPM_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Configure rpmsign
        env:
          RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
          RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}
        run: |
          if [ -z "$RPM_GPG_KEY_ID" ] || [ -z "$RPM_GPG_PASSPHRASE" ]; then
            echo "Missing RPM_GPG_KEY_ID or RPM_GPG_PASSPHRASE secret"
            exit 1
          fi

          PASS_FILE=/tmp/rpm-gpg-passphrase
          printf '%s' "$RPM_GPG_PASSPHRASE" > "$PASS_FILE"
          chmod 600 "$PASS_FILE"

          cat > ~/.rpmmacros <<MACROS
%_signature gpg
%_gpg_name $RPM_GPG_KEY_ID
%_gpg_path ~/.gnupg
%_gpgbin /usr/bin/gpg
%__gpg /usr/bin/gpg
%_gpg_passphrase_file $PASS_FILE
%__gpg_sign_cmd %{__gpg} \\
  gpg --batch --no-verbose --no-armor --pinentry-mode loopback \\
  --passphrase-file %{_gpg_passphrase_file} \\
  --digest-algo sha256 --sign --detach-sign \\
  --output %{__signature_filename} %{__plaintext_filename}
MACROS

      - name: Sign RPMs
        run: |
          find .rpmbuild/RPMS -type f -name '*.rpm' -print0 | xargs -0 -r rpmsign --addsign

      - name: Verify RPM signatures
        run: |
          find .rpmbuild/RPMS -type f -name '*.rpm' -print0 | xargs -0 -r rpm --checksig

      - name: Upload signed RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nltc-acrt-rpm-${{ github.ref_name }}
          path: |
            .rpmbuild/RPMS/**/*.rpm
            .rpmbuild/SRPMS/*.src.rpm

      - name: Publish to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .rpmbuild/RPMS/**/*.rpm
            .rpmbuild/SRPMS/*.src.rpm
